# The Corporate Supplier Sustainability Portal 2026
# Static SPA. No backend, no functions.
#
# Supabase config (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) is read at build
# time from the Netlify dashboard environment variables — never committed here.
# See docs/supabase-setup.md.
[build]
  command = "npm run build"
  publish = "dist"

# Single-URL app: static assets (the workbook, the PDFs) are matched first;
# any other path falls back to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
